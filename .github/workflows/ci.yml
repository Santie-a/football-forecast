name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (full stack — the test suite exercises the models)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,research]"
      - name: Lint
        run: ruff check src pipelines tests
      - name: Test
        run: pytest tests -q
